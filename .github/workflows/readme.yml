name: README

on:
  schedule:
    - cron: '0 */6 * * *'   
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    
    steps:
      - name: 签出代码
        uses: actions/checkout@v3
        
      - name: Java 21
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'
          
      - name: 生成 README
        run: |
          java Script.java
          
      - name: 提交并推送
        run: |
          git config user.name "SideDev"
          git config user.email "chushoubaikaishui@163.com"
          git add README.md
          git diff --quiet && git diff --staged --quiet || git commit -m " 动态刷新 README [skip ci]"
          git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/ImSideDev/ImSideDev.git HEAD:main
